<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Passenger Survival Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            width: 95%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚢 Survival Predictor</h2>

    <input type="number" id="pclass" placeholder="Pclass (1/2/3)">
    <input type="number" id="sex" placeholder="Sex (0=Male, 1=Female)">
    <input type="number" id="age" placeholder="Age">
    <input type="number" id="fare" placeholder="Fare">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
async function predict() {
    const data = {
        features: [
            parseFloat(document.getElementById("pclass").value),
            parseFloat(document.getElementById("sex").value),
            parseFloat(document.getElementById("age").value),
            parseFloat(document.getElementById("fare").value)
        ]
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
        result.prediction === 1 ? "✅ Survived" : "❌ Not Survived";
}
</script>

</body>
</html>
